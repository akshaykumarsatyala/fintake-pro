<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Pro — Finance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --primary: #14B8A6;
  --primary-dark: #0d9488;
  --accent: #22C55E;
  --danger: #ef4444;
  --warning: #f59e0b;
  --purple: #a855f7;
  --blue: #3b82f6;
  --sidebar-w: 260px;
  --header-h: 68px;
  --bg: #060c1a;
  --card: rgba(15,23,42,0.85);
  --card-border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-sub: #94a3b8;
  --input-bg: rgba(255,255,255,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ─── Layout ─── */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); min-height: 100vh;
  background: #070c1c;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100; overflow-y: auto;
}
.main-wrap { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  height: var(--header-h);
  background: rgba(6,12,26,0.96);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(20px);
}
.page-content { flex: 1; padding: 24px; max-width: 1440px; }

/* ─── Sidebar ─── */
.sidebar-logo { padding: 22px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 19px; box-shadow: 0 4px 14px rgba(20,184,166,0.4); flex-shrink: 0;
}
.logo-text { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-sub { font-size: 11px; color: var(--text-muted); }

.nav-section { padding: 16px 12px 8px; font-size: 10px; color: #334155; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; margin: 2px 8px; border-radius: 10px;
  cursor: pointer; transition: all 0.2s; color: var(--text-sub); font-size: 14px; font-weight: 500;
  position: relative; text-decoration: none;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active { background: linear-gradient(135deg, rgba(20,184,166,0.18), rgba(34,197,94,0.08)); color: var(--primary); }
.nav-item.active::before { content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--primary); border-radius: 0 3px 3px 0; }
.nav-item i { width: 18px; text-align: center; font-size: 14px; }
.nav-badge { margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.05); }
.user-card { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: 10px; cursor: pointer; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── Topbar ─── */
.topbar-title h1 { font-size: 18px; font-weight: 700; }
.topbar-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--card-border); background: rgba(255,255,255,0.04);
  color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.2s; position: relative;
}
.icon-btn:hover { border-color: var(--primary); color: var(--primary); }
.notif-badge { position: absolute; top: -4px; right: -4px; width: 17px; height: 17px; background: var(--danger); color: #fff; border-radius: 50%; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
.date-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; font-size: 12px; color: var(--text-sub); font-weight: 500; }

/* ─── Cards ─── */
.card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 16px; backdrop-filter: blur(20px);
  transition: all 0.25s; padding: 22px;
}
.card:hover { border-color: rgba(20,184,166,0.25); box-shadow: 0 8px 32px rgba(20,184,166,0.08); }

/* ─── Stat Cards ─── */
.stat-card { padding: 20px; border-radius: 16px; border: 1px solid var(--card-border); transition: all 0.25s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); margin-top: 6px; line-height: 1; }
.stat-change { display: flex; align-items: center; gap: 5px; font-size: 12px; margin-top: 12px; }
.stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

/* ─── Buttons ─── */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
.btn-primary:hover { box-shadow: 0 4px 16px rgba(20,184,166,0.4); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid var(--card-border); color: var(--text-sub); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ─── Tables ─── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; border-bottom: 1px solid var(--card-border); text-align: left; }
.data-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; vertical-align: middle; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table tr:last-child td { border-bottom: none; }

/* ─── Forms ─── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; background: var(--input-bg); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--primary); }
.form-select option { background: #0f172a; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #0a1020; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 28px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.06); border: none; color: var(--text-sub); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.modal-close:hover { background: rgba(239,68,68,0.2); color: #f87171; }

/* ─── Tags / Badges ─── */
.tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.tag-teal { background: rgba(20,184,166,0.15); color: var(--primary); }
.tag-green { background: rgba(34,197,94,0.12); color: #4ade80; }
.tag-red { background: rgba(239,68,68,0.12); color: #f87171; }
.tag-purple { background: rgba(168,85,247,0.12); color: #c084fc; }
.tag-orange { background: rgba(249,115,22,0.12); color: #fb923c; }
.tag-blue { background: rgba(59,130,246,0.12); color: #60a5fa; }

/* ─── Progress ─── */
.progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* ─── Grid Layouts ─── */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }

/* ─── Sections ─── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 16px; font-weight: 700; }
.section-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ─── AI Box ─── */
.ai-box { background: linear-gradient(135deg, rgba(20,184,166,0.1), rgba(34,197,94,0.06)); border: 1px solid rgba(20,184,166,0.2); border-radius: 14px; padding: 16px; }
.ai-label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

/* ─── Toast ─── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-width: 260px; max-width: 360px;
  transform: translateX(120%); transition: transform 0.3s;
}
.toast.show { transform: translateX(0); }
.toast-icon { font-size: 16px; flex-shrink: 0; }
.toast-success { border-left: 3px solid #22C55E; }
.toast-error { border-left: 3px solid #ef4444; }
.toast-info { border-left: 3px solid #3b82f6; }

/* ─── Search ─── */
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }
.search-input { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 8px 12px 8px 34px; color: var(--text); font-size: 13px; outline: none; width: 220px; transition: all 0.2s; }
.search-input:focus { border-color: var(--primary); width: 260px; }

/* ─── Filter chips ─── */
.filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--card-border); color: var(--text-sub); transition: all 0.2s; background: transparent; }
.chip:hover, .chip.active { background: rgba(20,184,166,0.12); border-color: var(--primary); color: var(--primary); }

/* ─── Empty state ─── */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-state i { font-size: 36px; color: #1e293b; margin-bottom: 12px; display: block; }
.empty-state p { color: var(--text-muted); font-size: 14px; }

/* ─── Health Ring ─── */
.health-ring-wrap { display: flex; flex-direction: column; align-items: center; }

/* ─── Notification item ─── */
.notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); transition: all 0.2s; cursor: pointer; }
.notif-item:hover { background: rgba(255,255,255,0.05); }
.notif-item.unread { border-left: 3px solid var(--primary); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ─── Settings ─── */
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.settings-row:last-child { border-bottom: none; }
.toggle { width: 42px; height: 24px; background: #1e293b; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; }
.toggle.on { background: var(--primary); }
.toggle-thumb { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: left 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.toggle.on .toggle-thumb { left: 21px; }

/* ─── Transaction type icon ─── */
.tx-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }

/* ─── Page specific ─── */
.analytics-kpi { text-align: center; padding: 20px 12px; }
.analytics-kpi .val { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; }
.analytics-kpi .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Gradient accents */
.gradient-teal { background: linear-gradient(135deg, rgba(20,184,166,0.12), rgba(20,184,166,0.04)); border: 1px solid rgba(20,184,166,0.15); }
.gradient-green { background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04)); border: 1px solid rgba(34,197,94,0.15); }
.gradient-red { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.04)); border: 1px solid rgba(239,68,68,0.12); }
.gradient-purple { background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(168,85,247,0.04)); border: 1px solid rgba(168,85,247,0.15); }
.gradient-orange { background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(249,115,22,0.04)); border: 1px solid rgba(249,115,22,0.12); }

/* Text helpers */
.text-green { color: #4ade80; }
.text-red { color: #f87171; }
.text-teal { color: var(--primary); }
.text-muted { color: var(--text-muted); }
.text-sub { color: var(--text-sub); }
.fw-700 { font-weight: 700; }
.mb-4 { margin-bottom: 4px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.f1 { flex: 1; }

/* ─── Animations ─── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.page-enter { animation: fadeIn 0.35s ease; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.5;} }
.pulse { animation: pulse 2s infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

/* ─── Responsive ─── */
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 900px) {
  .grid-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-wrap { margin-left: 0; }
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .page-content { padding: 16px; }
}

/* ─── Loading Screen ─── */
#loading-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
  transition: opacity 0.4s;
}
.loader-ring { width: 48px; height: 48px; border: 3px solid rgba(20,184,166,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div id="loading-screen">
  <div class="logo-icon" style="margin-bottom:16px;font-size:24px;">💰</div>
  <div style="font-family:Sora,sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#14B8A6,#22C55E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;">FinTrack Pro</div>
  <div class="loader-ring"></div>
</div>

<div id="app" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="flex items-center gap-12">
        <div class="logo-icon">💰</div>
        <div>
          <div class="logo-text">FinTrack Pro</div>
          <div class="logo-sub">Finance Platform</div>
        </div>
      </div>
    </div>

    <div style="padding:8px 0 16px;">
      <div class="nav-section">Main</div>
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <i class="fas fa-th-large"></i> Dashboard
      </a>
      <a class="nav-item" data-page="expenses" onclick="navigate('expenses')">
        <i class="fas fa-credit-card"></i> Expenses
      </a>
      <a class="nav-item" data-page="income" onclick="navigate('income')">
        <i class="fas fa-wallet"></i> Income
      </a>
      <div class="nav-section">Planning</div>
      <a class="nav-item" data-page="budget" onclick="navigate('budget')">
        <i class="fas fa-bullseye"></i> Budget Planner
      </a>
      <a class="nav-item" data-page="savings" onclick="navigate('savings')">
        <i class="fas fa-piggy-bank"></i> Savings Goals
      </a>
      <div class="nav-section">Insights</div>
      <a class="nav-item" data-page="analytics" onclick="navigate('analytics')">
        <i class="fas fa-chart-bar"></i> Analytics
      </a>
      <a class="nav-item" data-page="transactions" onclick="navigate('transactions')">
        <i class="fas fa-exchange-alt"></i> Transactions
      </a>
      <div class="nav-section">Account</div>
      <a class="nav-item" data-page="notifications" onclick="navigate('notifications')" id="notif-nav">
        <i class="fas fa-bell"></i> Notifications
        <span class="nav-badge" id="nav-badge">2</span>
      </a>
      <a class="nav-item" data-page="settings" onclick="navigate('settings')">
        <i class="fas fa-cog"></i> Settings
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name">Alex Johnson</div>
          <div class="user-email">demo@fintrackpro.com</div>
        </div>
        <i class="fas fa-ellipsis-h" style="color:var(--text-muted);font-size:13px;flex-shrink:0;"></i>
      </div>
      <button class="btn btn-outline" style="width:100%;margin-top:10px;font-size:12px;justify-content:center;" onclick="showToast('Logged out successfully','success')">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrap">
    <!-- Topbar -->
    <header class="topbar">
      <button class="icon-btn" id="menu-toggle" onclick="toggleSidebar()" style="display:none;margin-right:4px;">
        <i class="fas fa-bars"></i>
      </button>

const $ = id => document.getElementById(id);
const fc = (n, c='USD') => new Intl.NumberFormat('en-US',{style:'currency',currency:c,maximumFractionDigits:0}).format(n);
const uid = () => Math.random().toString(36).slice(2,10);

function getMonthBounds(offsetMonths = 0) {
  const d = new Date(); d.setMonth(d.getMonth() - offsetMonths);
  const y = d.getFullYear(), m = d.getMonth();
  const start = new Date(y, m, 1).toISOString().split('T')[0];
  const end = new Date(y, m+1, 0).toISOString().split('T')[0];
  return { start, end };
}

function computeStats() {
  const { start, end } = getMonthBounds(0);
  const mIncome = DB.income.filter(i => i.date >= start && i.date <= end).reduce((s,i)=>s+i.amount,0);
  const mExpenses = DB.expenses.filter(e => e.date >= start && e.date <= end).reduce((s,e)=>s+e.amount,0);
  const totalIncome = DB.income.reduce((s,i)=>s+i.amount,0);
  const totalExpenses = DB.expenses.reduce((s,e)=>s+e.amount,0);
  const totalSavings = DB.savingsGoals.reduce((s,g)=>s+g.current,0);
  const totalBalance = totalIncome - totalExpenses;
  const curBudgets = DB.budgets.filter(b=>b.month===now.getMonth()+1&&b.year===now.getFullYear());
  const totalBudget = curBudgets.reduce((s,b)=>s+b.amount,0);
  const budgetUtil = totalBudget > 0 ? Math.min((mExpenses/totalBudget)*100,100) : 0;
  const savingsRate = mIncome > 0 ? ((mIncome-mExpenses)/mIncome)*100 : 0;
  const budgetAdh = budgetUtil <= 80 ? 100 : budgetUtil <= 100 ? 60 : 20;
  const goalProg = DB.savingsGoals.length > 0 ? (DB.savingsGoals.reduce((s,g)=>s+(g.current/g.target),0)/DB.savingsGoals.length)*100 : 50;
  const healthScore = Math.min(100, Math.max(0, Math.round((savingsRate*0.4)+(budgetAdh*0.35)+(goalProg*0.25))));
  return { mIncome, mExpenses, totalBalance, totalSavings, budgetUtil, healthScore };
}

function catColor(cat) {
  const m = {Food:'#fb923c',Travel:'#60a5fa',Shopping:'#c084fc',Entertainment:'#f472b6',Education:'#34d399',Health:'#f87171',Bills:'#fbbf24',Others:'#94a3b8'};
  return m[cat] || '#94a3b8';
}
function catIcon(cat) {
  const m = {Food:'🍔',Travel:'✈️',Shopping:'🛍️',Entertainment:'🎭',Education:'📚',Health:'💊',Bills:'📄',Others:'📦',Salary:'💼',Freelancing:'💻',Investments:'📈',Business:'🏢',Gifts:'🎁',Other:'💰'};
  return m[cat] || '💰';
}

function navigate(page) {
  activePage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const t = pageTitles[page];
  $('topbar-title').querySelector('h1').textContent = t.title;
  $('topbar-subtitle').textContent = t.sub;
  const container = $('page-container');
  container.innerHTML = '';
  container.className = 'page-content page-enter';
  const renderers = {
    dashboard: renderDashboard,
    expenses: renderExpenses,
    income: renderIncome,
    budget: renderBudget,
    savings: renderSavings,
    analytics: renderAnalytics,
    transactions: renderTransactions,
    notifications: renderNotifications,
    settings: renderSettings,
  };
  (renderers[page] || renderDashboard)();
  // Update notification badge
  const unread = DB.notifications.filter(n=>!n.read).length;
  $('nav-badge').textContent = unread;
  $('nav-badge').style.display = unread ? '' : 'none';
  $('topbar-notif-badge').textContent = unread;
  $('topbar-notif-badge').style.display = unread ? '' : 'none';
}

let chartInstances = {};
function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try{c.destroy();}catch(e){} });
  chartInstances = {};
}

        </div>
        <div class="stat-change"><i class="fas fa-arrow-up text-green"></i><span class="text-green fw-700">8.2%</span><span class="text-muted">vs last month</span></div>
      </div>
      <div class="stat-card gradient-red">
        <div class="flex justify-between items-center mb-16">
          <div>
            <div class="stat-label">Monthly Expenses</div>

          </div>

        </div>

            <div class="stat-label">Budget Used</div>

          </div>
          <div class="stat-icon" style="background:rgba(249,115,22,0.2);color:#f97316;"><i class="fas fa-bullseye"></i></div>
        </div>
        <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${s.budgetUtil}%;background:linear-gradient(90deg,#f97316,#fb923c);"></div></div>
      </div>
    </div>

    <!-- Charts Row -->
    <div style="display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px;" class="mb-24">
      <div class="card">
        <div class="section-header">
          <div><div class="section-title">Income vs Expenses</div><div class="section-sub">Last 6 months trend</div></div>
          <span class="tag tag-teal">6 Months</span>
        </div>
        <div style="height:200px;"><canvas id="line-chart"></canvas></div>
      </div>
      <div class="card">

        <div class="section-sub mb-16">Current month</div>
        <div style="height:200px;"><canvas id="donut-chart"></canvas></div>
      </div>
    </div>

    <!-- Bottom Row -->
    <div style="display:grid;grid-template-columns:minmax(0,1fr) 300px 250px;gap:20px;">
      <!-- Recent Transactions -->
      <div class="card">
        <div class="section-header">
          <div class="section-title">Recent Transactions</div>
          <span style="font-size:12px;color:var(--primary);cursor:pointer;font-weight:600;" onclick="navigate('transactions')">View All →</span>

      </div>
      <!-- Savings Goals -->
      <div class="card">
        <div class="section-title mb-20">Savings Goals</div>

      <!-- Health + AI -->

        <div class="ai-box">

  // Recent transactions
  const allTx = [
    ...DB.expenses.map(e=>({...e,type:'expense'})),

  $('recent-tx').innerHTML = allTx.length ? allTx.map(t=>`

      <span style="font-size:12px;color:var(--text-muted);">Financial Health</span>

  // AI insight
  const s2 = computeStats();

  if (!insights.length) insights.push(`✅ Finances look healthy this month! Keep tracking to maintain progress.`);
  $('ai-insight').textContent = insights[0];

  const months6 = Array.from({length:6},(_,i)=>{

function setExpFilter(cat, el) {

function filterExpenseList() { renderExpenseRows(); }

function renderExpenseRows() {
  const search = ($('exp-search')?.value||'').toLowerCase();
  let list = DB.expenses.filter(e => {
    if (expFilter !== 'All' && e.category !== expFilter) return false;
    if (search && !e.description.toLowerCase().includes(search) && !e.category.toLowerCase().includes(search)) return false;
    return true;

function saveExpense(id) {
  const amount = parseFloat($('f-amount').value);
  if (!amount || isNaN(amount)) { showToast('Enter a valid amount','error'); return; }
  if (id) {

    showToast('Expense updated!','success');

}

function renderBudget() {
  destroyCharts();
  const {start,end} = getMonthBounds(0);
  const curBudgets = DB.budgets.filter(b=>b.month===now.getMonth()+1&&b.year===now.getFullYear());
  const totalBudget = curBudgets.reduce((s,b)=>s+b.amount,0);
  const totalSpent = DB.expenses.filter(e=>e.date>=start&&e.date<=end).reduce((s,e)=>s+e.amount,0);
  const container = $('page-container');
  container.innerHTML = `
    <div class="grid-4 mb-24">
      <div class="stat-card gradient-teal">
        <div class="stat-label">Total Budget</div>
        <div class="stat-value">${fc(totalBudget)}</div>
      </div>
      <div class="stat-card gradient-red">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value">${fc(totalSpent)}</div>
      </div>
      <div class="stat-card gradient-green">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" style="color:#4ade80;">${fc(Math.max(0,totalBudget-totalSpent))}</div>
      </div>
      <div class="stat-card gradient-orange">
        <div class="stat-label">Utilization</div>
        <div class="stat-value">${totalBudget>0?((totalSpent/totalBudget)*100).toFixed(0):0}%</div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <div><div class="section-title">Monthly Budgets</div><div class="section-sub">${now.toLocaleString('en-US',{month:'long',year:'numeric'})}</div></div>
        <button class="btn btn-primary" onclick="openBudgetModal()"><i class="fas fa-plus"></i> Set Budget</button>
      </div>
      <div id="budget-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;"></div>
    </div>`;

  const catTotals = {};
  DB.expenses.filter(e=>e.date>=start&&e.date<=end).forEach(e=>{catTotals[e.category]=(catTotals[e.category]||0)+e.amount;});
  $('budget-list').innerHTML = curBudgets.length ? curBudgets.map(b=>{
    const spent = catTotals[b.category]||0;
    const pct = Math.min(100,(spent/b.amount)*100);
    const over = pct>=100;
    return `<div class="card" style="padding:18px;">
      <div class="flex justify-between items-center mb-16">
        <div class="flex items-center gap-12">
          <div style="width:40px;height:40px;border-radius:12px;background:${catColor(b.category)}22;display:flex;align-items:center;justify-content:center;font-size:18px;">${catIcon(b.category)}</div>
          <div><div style="font-weight:700;font-size:14px;">${b.category}</div><div style="font-size:11px;color:var(--text-muted);">Monthly limit</div></div>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-outline btn-sm" onclick="openBudgetModal('${b.id}')"><i class="fas fa-edit"></i></button>
          <button class="btn btn-danger btn-sm" onclick="deleteBudget('${b.id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="flex justify-between mb-8">
        <span style="font-size:13px;color:var(--text-muted);">Spent: <strong style="color:${over?'#f87171':'var(--text)'};">${fc(spent)}</strong></span>
        <span style="font-size:13px;color:var(--text-muted);">Limit: <strong>${fc(b.amount)}</strong></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${pct>=100?'#ef4444':pct>=80?'#f59e0b':'linear-gradient(90deg,#14B8A6,#22C55E)'};"></div>
      </div>
      <div class="flex justify-between" style="margin-top:6px;">
        <span style="font-size:11px;color:${over?'#f87171':'#64748b'};">${over?'⚠️ Over budget':'On track'}</span>
        <span style="font-size:11px;font-weight:700;color:${over?'#f87171':'var(--primary)'};">${pct.toFixed(0)}%</span>
      </div>
    </div>`;
  }).join('') : '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-bullseye"></i><p>No budgets set. Add one to start tracking.</p></div>';
}
function openBudgetModal(id) {

        <input type="number" class="form-input" id="fb-year" value="${b?.year||now.getFullYear()}">
      </div>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-outline f1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary f1" onclick="saveBudget('${id||''}')"><i class="fas fa-check"></i> ${b?'Update':'Set'} Budget</button>
    </div>`;
  openModal();
}
function saveBudget(id) {
  const amount = parseFloat($('fb-amount').value);
  if (!amount||isNaN(amount)) { showToast('Enter a valid amount','error'); return; }
  if (id) {
    const i = DB.budgets.findIndex(x=>x.id===id);
    if(i>-1) DB.budgets[i]={...DB.budgets[i],amount,category:$('fb-cat').value,month:parseInt($('fb-month').value),year:parseInt($('fb-year').value)};
    showToast('Budget updated!','success');
  } else {
    DB.budgets.push({id:uid(),amount,category:$('fb-cat').value,month:parseInt($('fb-month').value),year:parseInt($('fb-year').value)});
    showToast('Budget set!','success');
  }
  closeModal(); renderBudget();
}
function deleteBudget(id) {
  DB.budgets = DB.budgets.filter(b=>b.id!==id);
  showToast('Budget removed','info');
  renderBudget();
}

function renderSavings() {
  destroyCharts();
  const total = DB.savingsGoals.reduce((s,g)=>s+g.current,0);
  const target = DB.savingsGoals.reduce((s,g)=>s+g.target,0);
  const completed = DB.savingsGoals.filter(g=>g.completed).length;
  $('page-container').innerHTML = `
    <div class="grid-4 mb-24">
      <div class="stat-card gradient-teal"><div class="stat-label">Total Saved</div><div class="stat-value">${fc(total)}</div></div>
      <div class="stat-card gradient-purple"><div class="stat-label">Total Target</div><div class="stat-value">${fc(target)}</div></div>
      <div class="stat-card gradient-green"><div class="stat-label">Completed</div><div class="stat-value">${completed} / ${DB.savingsGoals.length}</div></div>
      <div class="stat-card gradient-orange"><div class="stat-label">Overall Progress</div><div class="stat-value">${target>0?((total/target)*100).toFixed(0):0}%</div></div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="section-title">Savings Goals</div>
        <button class="btn btn-primary" onclick="openSavingsModal()"><i class="fas fa-plus"></i> New Goal</button>
      </div>
      <div id="goals-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;"></div>

  $('goals-grid').innerHTML = DB.savingsGoals.length ? DB.savingsGoals.map(g=>{
    const pct = Math.min(100,(g.current/g.target)*100);
    const daysLeft = g.deadline ? Math.max(0,Math.floor((new Date(g.deadline)-now)/(1000*60*60*24))) : null;
    return `<div class="card" style="padding:20px;">
      <div class="flex justify-between items-start mb-16">
        <div class="flex items-center gap-12">
          <div style="width:46px;height:46px;border-radius:14px;background:rgba(20,184,166,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;">${g.icon}</div>
          <div>
            <div style="font-weight:700;font-size:15px;">${g.title}</div>
            ${daysLeft!==null?`<div style="font-size:11px;color:${daysLeft<30?'#f87171':'var(--text-muted)'};">${daysLeft} days left</div>`:''}
          </div>
        </div>
        <div class="flex gap-8">
          ${!g.completed?`<button class="btn btn-outline btn-sm" onclick="openAddFundsModal('${g.id}')"><i class="fas fa-plus"></i></button>`:''}
          <button class="btn btn-outline btn-sm" onclick="openSavingsModal('${g.id}')"><i class="fas fa-edit"></i></button>
          <button class="btn btn-danger btn-sm" onclick="deleteGoal('${g.id}')"><i class="fas fa-trash"></i></button>

      </div>
      <div class="progress-bar" style="height:8px;">
        <div class="progress-fill" style="width:${pct}%;background:${g.completed?'#22C55E':'linear-gradient(90deg,#14B8A6,#22C55E)'};"></div>
      </div>
      <div class="flex justify-between" style="margin-top:8px;">
        <span class="tag ${g.completed?'tag-green':'tag-teal'}">${g.completed?'✅ Completed':'In Progress'}</span>

    </div>
    <div class="form-row">
      <div class="form-group">

    </div>`;

}
function openAddFundsModal(id) {
  const g = DB.savingsGoals.find(x=>x.id===id);
  $('modal-body').innerHTML = `
    <div class="modal-header">
      <div><div class="modal-title">Add Funds</div><div style="font-size:12px;color:var(--text-muted);">to ${g.icon} ${g.title}</div></div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:13px;color:var(--text-muted);">Current: ${fc(g.current)} / ${fc(g.target)}</div>
      <div class="progress-bar" style="margin-top:10px;height:8px;"><div class="progress-fill" style="width:${Math.min(100,(g.current/g.target)*100)}%;background:linear-gradient(90deg,#14B8A6,#22C55E);"></div></div>
    </div>
    <div class="form-group">
      <label class="form-label">Amount to Add ($)</label>
      <input type="number" class="form-input" id="fa-funds" placeholder="0.00">
    </div>
    <div class="flex gap-8">
      <button class="btn btn-outline f1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary f1" onclick="addFunds('${id}')"><i class="fas fa-plus"></i> Add Funds</button>
    </div>`;
  openModal();
}
function addFunds(id) {
  const amt = parseFloat($('fa-funds').value);
  if (!amt||isNaN(amt)||amt<=0) { showToast('Enter a valid amount','error'); return; }
  const i = DB.savingsGoals.findIndex(x=>x.id===id);
  if(i>-1) {
    DB.savingsGoals[i].current = Math.min(DB.savingsGoals[i].target, DB.savingsGoals[i].current + amt);
    if (DB.savingsGoals[i].current >= DB.savingsGoals[i].target) DB.savingsGoals[i].completed = true;
    showToast('Funds added! 🎉','success');
  }
  closeModal(); renderSavings();
}
function saveGoal(id) {
  const target = parseFloat($('fg-target').value);
  const current = parseFloat($('fg-current').value)||0;
  const title = $('fg-title').value;
  if (!title) { showToast('Enter a title','error'); return; }
  if (!target||isNaN(target)) { showToast('Enter a valid target','error'); return; }
  if (id) {
    const i = DB.savingsGoals.findIndex(x=>x.id===id);
    if(i>-1) DB.savingsGoals[i]={...DB.savingsGoals[i],title,target,current,deadline:$('fg-deadline').value,icon:$('fg-icon').value,completed:current>=target};
    showToast('Goal updated!','success');
  } else {
    DB.savingsGoals.push({id:uid(),title,target,current,deadline:$('fg-deadline').value,icon:$('fg-icon').value,completed:current>=target});
    showToast('Goal created!','success');
  }
  closeModal(); renderSavings();
}
function deleteGoal(id) {
  DB.savingsGoals = DB.savingsGoals.filter(g=>g.id!==id);
  showToast('Goal deleted','info');
  renderSavings();
}

function renderAnalytics() {

  const monthStats = months6.map(({start,end})=>({

        <div class="val" style="color:#22C55E;">${s.healthScore}</div>
        <div class="lbl">Financial Health</div>
      </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="grid-2 mb-20">
      <div class="card">
        <div class="section-title mb-4">Monthly Overview</div>
        <div class="section-sub mb-16">Income & Expenses trend</div>
        <div style="height:240px;"><canvas id="bar-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title mb-4">Expense Categories</div>
        <div class="section-sub mb-16">Breakdown this month</div>
        <div style="height:240px;"><canvas id="pie-chart"></canvas></div>
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="grid-2">
      <div class="card">
        <div class="section-title mb-4">Savings Trend</div>
        <div class="section-sub mb-16">Monthly net savings</div>
        <div style="height:220px;"><canvas id="savings-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title mb-16">Income Sources</div>
        <div id="income-sources"></div>
      </div>
    </div>
  `;

  const cBase = {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:11},boxWidth:12,padding:12}},tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#94a3b8',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:11},callback:v=>`$${v/1000}k`}}}};

  chartInstances['bar'] = new Chart($('bar-chart'),{type:'bar',data:{labels,datasets:[{label:'Income',data:monthStats.map(m=>m.inc),backgroundColor:'rgba(34,197,94,0.7)',borderRadius:6},{label:'Expenses',data:monthStats.map(m=>m.exp),backgroundColor:'rgba(20,184,166,0.7)',borderRadius:6}]},options:{...cBase,plugins:{...cBase.plugins,legend:{...cBase.plugins.legend}}}});

  const cats = Object.keys(catTotals);
  chartInstances['pie'] = new Chart($('pie-chart'),{type:'doughnut',data:{labels:cats.length?cats:['No Data'],datasets:[{data:cats.length?Object.values(catTotals):[1],backgroundColor:colors.slice(0,cats.length||1),borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#64748b',font:{size:11},boxWidth:10,padding:10}},tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#94a3b8',borderColor:'rgba(255,255,255,0.08)',borderWidth:1}}}});

let txTypeFilter = 'All';
function renderTransactions() {
  destroyCharts();
  const allTx = [
    ...DB.expenses.map(e=>({...e,type:'expense'})),
    ...DB.income.map(i=>({...i,type:'income',category:i.source})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalInc = DB.income.reduce((s,i)=>s+i.amount,0);
  const totalExp = DB.expenses.reduce((s,e)=>s+e.amount,0);
  $('page-container').innerHTML = `
    <div class="grid-4 mb-24">
      <div class="stat-card gradient-teal"><div class="stat-label">All Transactions</div><div class="stat-value">${allTx.length}</div></div>
      <div class="stat-card gradient-green"><div class="stat-label">Total Income</div><div class="stat-value">${fc(totalInc)}</div></div>
      <div class="stat-card gradient-red"><div class="stat-label">Total Expenses</div><div class="stat-value">${fc(totalExp)}</div></div>
      <div class="stat-card gradient-purple"><div class="stat-label">Net Balance</div><div class="stat-value" style="color:#4ade80;">${fc(totalInc-totalExp)}</div></div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="section-title">Transaction History</div>
        <div class="flex items-center gap-8">
          <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input class="search-input" placeholder="Search..." id="tx-search" oninput="renderTxRows()">
          </div>
        </div>
      </div>
      <div class="filter-chips mb-20">
        <button class="chip active" onclick="setTxFilter('All',this)">All</button>
        <button class="chip" onclick="setTxFilter('income',this)">Income</button>
        <button class="chip" onclick="setTxFilter('expense',this)">Expenses</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table"><thead><tr><th>Type</th><th>Category</th><th>Description</th><th>Date</th><th style="text-align:right;">Amount</th></tr></thead>
        <tbody id="tx-tbody"></tbody></table>
      </div>
    </div>`;
  renderTxRows();
}
function setTxFilter(t, el) {
  txTypeFilter = t;
  document.querySelectorAll('.filter-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTxRows();
}
function renderTxRows() {
  const search = ($('tx-search')?.value||'').toLowerCase();
  const allTx = [
    ...DB.expenses.map(e=>({...e,type:'expense'})),
    ...DB.income.map(i=>({...i,type:'income',category:i.source})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date))
   .filter(t=>{
    if(txTypeFilter!=='All'&&t.type!==txTypeFilter) return false;
    if(search&&!t.description.toLowerCase().includes(search)&&!t.category.toLowerCase().includes(search)) return false;
    return true;
  });
  const tbody = $('tx-tbody');
  if(!tbody) return;
  tbody.innerHTML = allTx.length ? allTx.map(t=>`
    <tr>
      <td><span class="tag ${t.type==='income'?'tag-green':'tag-red'}">${t.type==='income'?'↑ Income':'↓ Expense'}</span></td>
      <td><span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;">${catIcon(t.category)} ${t.category}</span></td>
      <td style="font-size:13px;color:var(--text);">${t.description||'—'}</td>
      <td style="font-size:12px;color:var(--text-muted);">${new Date(t.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
      <td style="text-align:right;font-weight:700;color:${t.type==='income'?'#4ade80':'#f87171'};">${t.type==='income'?'+':'-'}${fc(t.amount)}</td>
    </tr>`).join('') : '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-exchange-alt"></i><p>No transactions found</p></div></td></tr>';
}

          <div class="section-sub">${unread} unread</div>

function renderNotifList() {

  if(!el) return;

  const typeColor = {warning:'#f59e0b',success:'#22C55E',info:'#3b82f6',error:'#ef4444'};
  el.innerHTML = DB.notifications.length ? DB.notifications.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="markRead('${n.id}')">

      <div class="f1">
        <div class="flex justify-between items-center">
          <span style="font-size:14px;font-weight:${n.read?'500':'700'};color:${n.read?'var(--text-sub)':'var(--text)'};">${n.title}</span>
          <span style="font-size:11px;color:var(--text-muted);">${n.time}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px;">${n.message}</div>
      </div>
      ${!n.read?`<div class="notif-dot" style="background:${typeColor[n.type]};"></div>`:''}
    </div>`).join('') : '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>';
}
function markRead(id) {
  const i = DB.notifications.findIndex(n=>n.id===id);
  if(i>-1) DB.notifications[i].read = true;
  renderNotifList();
  navigate('notifications');
}
function markAllRead() {
  DB.notifications.forEach(n=>n.read=true);
  showToast('All notifications marked as read','success');
  renderNotifications();
}

        <div class="section-title mb-20">Profile Settings</div>
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--card-border);">
          <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#14B8A6,#22C55E);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0;box-shadow:0 4px 16px rgba(20,184,166,0.3);">A</div>
          <div>
            <div style="font-size:18px;font-weight:700;">${s.name}</div>
            <div style="font-size:13px;color:var(--text-muted);">${s.email}</div>
            <span class="tag tag-teal" style="margin-top:6px;">Demo Account</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="s-name" value="${s.name}">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="s-email" value="${s.email}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Currency</label>
            <select class="form-select" id="s-currency">
              ${['USD','EUR','GBP','INR','JPY','CAD','AUD'].map(c=>`<option ${c===s.currency?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Save Changes</button>
      </div>

      <!-- Preferences -->
      <div class="card mb-20">
        <div class="section-title mb-20">Preferences</div>
        <div class="settings-row">
          <div>
            <div style="font-size:14px;font-weight:600;">Dark Mode</div>
            <div style="font-size:12px;color:var(--text-muted);">Toggle dark/light theme</div>
          </div>
          <div class="toggle on" id="toggle-dark" onclick="toggleSetting('dark')">
            <div class="toggle-thumb"></div>
          </div>
        </div>
        <div class="settings-row">
          <div>
            <div style="font-size:14px;font-weight:600;">Push Notifications</div>
            <div style="font-size:12px;color:var(--text-muted);">Budget alerts and reminders</div>
          </div>
          <div class="toggle ${s.notifications?'on':''}" id="toggle-notif" onclick="toggleSetting('notif')">
            <div class="toggle-thumb"></div>
          </div>
        </div>
        <div class="settings-row">
          <div>
            <div style="font-size:14px;font-weight:600;">Weekly Report</div>
            <div style="font-size:12px;color:var(--text-muted);">Receive weekly financial summary</div>
          </div>
          <div class="toggle ${s.weeklyReport?'on':''}" id="toggle-weekly" onclick="toggleSetting('weekly')">
            <div class="toggle-thumb"></div>
          </div>
        </div>
        <div class="settings-row">
          <div>
            <div style="font-size:14px;font-weight:600;">Budget Alerts</div>
            <div style="font-size:12px;color:var(--text-muted);">Get alerted when nearing budget limits</div>
          </div>
          <div class="toggle ${s.budgetAlerts?'on':''}" id="toggle-budget" onclick="toggleSetting('budget')">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="card" style="border-color:rgba(239,68,68,0.2);">
        <div class="section-title mb-4" style="color:#f87171;">Danger Zone</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">These actions are irreversible.</div>
        <div class="flex gap-8">
          <button class="btn btn-danger" onclick="showToast('Export feature coming soon','info')"><i class="fas fa-download"></i> Export Data</button>
          <button class="btn btn-danger" onclick="showToast('Data cleared (demo only)','info')"><i class="fas fa-trash-alt"></i> Clear All Data</button>
        </div>
      </div>
    </div>`;
}
function saveSettings() {
  DB.settings.name = $('s-name').value;
  DB.settings.email = $('s-email').value;
  DB.settings.currency = $('s-currency').value;
  showToast('Settings saved!','success');
}
function toggleSetting(key) {
  const map = {dark:'toggle-dark',notif:'toggle-notif',weekly:'toggle-weekly',budget:'toggle-budget'};
  const el = $(map[key]);
  el.classList.toggle('on');
  if(key==='dark') showToast('Theme preference saved','info');
}

// ════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════
function openModal() {
  $('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === $('modal-overlay')) {
    $('modal-overlay').classList.remove('open');
  }
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg, type='info') {
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span class="toast-icon">${icons[type]||'📬'}</span><span>${msg}</span>`;
  $('toast-container').appendChild(t);
  requestAnimationFrame(()=>{ setTimeout(()=>t.classList.add('show'),10); });
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); },3000);
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function toggleSidebar() {
  $('sidebar').classList.toggle('open');
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Set date
  $('date-display').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Responsive: show hamburger on small screens
  const checkW = () => {
    const show = window.innerWidth < 700;
    $('menu-toggle').style.display = show ? '' : 'none';
  };
  checkW();
  window.addEventListener('resize', checkW);

  // Hide loading, show app
  setTimeout(()=>{
    const ls = $('loading-screen');
    ls.style.opacity = '0';
    setTimeout(()=>{ ls.style.display='none'; $('app').style.display='flex'; navigate('dashboard'); },400);
  }, 800);
});
</script>
</body>
</html>
